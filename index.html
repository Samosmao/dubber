<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>
Khmer AI Dubber
</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#020617;
}

.scroll{
max-height:350px;
overflow:auto;
}

</style>

</head>

<body
class="
text-white
min-h-screen
p-10
"
>

<div
class="
max-w-6xl
mx-auto
"
>

<div
class="
text-center
mb-10
"
>

<h1
class="
text-5xl
font-bold
"
>
🇰🇭 Khmer AI Video Dubber
</h1>

<p
class="
text-slate-400
mt-3
"
>
Video → MP3 → Subtitle → Khmer → TTS → Output
</p>

</div>



<div
class="
grid
grid-cols-2
gap-8
"
>


<!-- LEFT -->


<div>

<div
class="
bg-slate-900
rounded-3xl
p-6
"
>

<h2
class="
text-2xl
mb-4
"
>
📹 Original Video
</h2>

<video
id="preview"

controls

class="
w-full
rounded-xl
bg-black
"
></video>


<input

id="video"

type="file"

accept="video/*"

class="
mt-6
w-full
"

onchange="
previewVideo()
"

>


<button

onclick="
processSubtitle()
"

class="
w-full
mt-4
bg-indigo-600
py-4
rounded-xl
"

>

📝 Generate Subtitle

</button>


<button

onclick="
processDub()
"

class="
w-full
mt-4
bg-green-600
py-4
rounded-xl
"

>

🎙 Generate Khmer Dub

</button>

</div>

</div>


<!-- RIGHT -->


<div>


<div

class="
bg-slate-900
rounded-3xl
p-6
"

>

<h2
class="
text-2xl
mb-5
"
>
📝 Subtitle Preview
</h2>


<div
id="subtitle"
class="scroll"
>

Waiting...

</div>

</div>



<div

class="
bg-slate-900
rounded-3xl
p-6
mt-8
"

>

<h2
class="
text-2xl
mb-5
"
>

🎬 Output Video

</h2>


<video

id="output"

controls

class="
w-full
rounded-xl
bg-black
"

></video>


<a

id="download"

class="
hidden
block
mt-4
bg-green-700
text-center
py-3
rounded
"

download

>

Download Video

</a>


</div>


</div>


</div>


</div>



<script>

let selected=null


function previewVideo(){

selected=
document
.getElementById(
"video"
)
.files[0]

if(
!selected
)return

document
.getElementById(
"preview"
)
.src=
URL
.createObjectURL(
selected
)

}



async function processSubtitle(){

if(
!selected
){

alert(
"Choose video"
)

return

}


let fd=
new FormData()

fd.append(
"file",
selected
)

document
.getElementById(
"subtitle"
)
.innerHTML=
"Processing..."


let r=
await fetch(

"/subtitle",

{

method:
"POST",

body:
fd

}

)

let data=
await r.json()

render(
data
)

}



function render(
rows
){

let html=""

rows.forEach(

x=>{

html+=`

<div
class="
mb-5
border-b
border-slate-700
pb-4
"
>

<div
class="
text-green-400
"
>

${x.start}

→

${x.end}

</div>

<div
class="
mt-2
"
>

CN:

${x.original}

</div>

<div
class="
mt-2
text-cyan-300
"
>

KH:

${x.khmer}

</div>

</div>

`

}

)

document
.getElementById(
"subtitle"
)
.innerHTML=
html

}




async function processDub(){

if(
!selected
){

alert(
"Choose video"
)

return

}

let fd=
new FormData()

fd.append(
"file",
selected
)

let btn=
event.target

btn.disabled=true

btn.innerHTML=
"Processing..."


let r=
await fetch(

"/dub",

{

method:
"POST",

body:
fd

}

)

if(
!r.ok
){

alert(
"Failed"
)

btn.disabled=false

btn.innerHTML=
"Generate Khmer Dub"

return

}


let blob=
await r.blob()

let url=
URL
.createObjectURL(
blob
)

document
.getElementById(
"output"
)
.src=
url


let dl=
document
.getElementById(
"download"
)

dl.href=url

dl.classList.remove(
"hidden"
)

btn.disabled=false

btn.innerHTML=
"Generate Khmer Dub"

}



</script>

</body>

</html>
