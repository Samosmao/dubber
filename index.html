<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="utf-8">
    <title>Khmer AI Video Dubber Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; background: #0b0f19; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
    </style>
</head>
<body class="text-slate-100 min-h-screen antialiased">

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-sky-400 to-emerald-400 bg-clip-text text-transparent">
                Juk AI
            </h1>
            <p class="text-slate-400 mt-3 text-sm font-medium">
                Power by juk
            </p>
        </div>

        <div id="progress-container" class="hidden max-w-3xl mx-auto mb-8 bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-3">
                <span id="progress-status" class="text-sm font-semibold text-indigo-400 animate-pulse">កំពុងដំណើរការ...</span>
                <span id="progress-percent" class="text-lg font-bold text-emerald-400">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[2px]">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-emerald-500 h-full rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            
            <div class="space-y-8">
                <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-indigo-400">📹 វីដេអូដើម (Original Video)</h2>
                    
                    <div class="relative aspect-video w-full rounded-2xl overflow-hidden bg-slate-950 border border-slate-800 flex items-center justify-center">
                        <video id="preview" controls class="w-full h-full object-contain hidden z-10"></video>
                        <div id="upload-placeholder" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                            <span class="text-4xl mb-3">📥</span>
                            <p class="text-sm font-medium text-slate-300">សូមជ្រើសរើសឯកសារវីដេអូ</p>
                        </div>
                    </div>

                    <input id="video" type="file" accept="video/*" class="hidden" onchange="previewVideo()">
                    <button onclick="document.getElementById('video').click()" class="w-full mt-4 bg-slate-800 hover:bg-slate-700 text-sm font-semibold py-3 px-4 rounded-xl border border-slate-700">
                        🔍 ជ្រើសរើសវីដេអូ
                    </button>

                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <button id="btn-subtitle" onclick="generateSubtitle()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-4 rounded-xl text-sm">
                            📝 ១. បង្កើត Subtitle
                        </button>
                        <button id="btn-dub" onclick="generateDub()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-4 rounded-xl text-sm">
                            🎙️ ២. ដំណើរការបញ្ចូលសំឡេង
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-sky-400">📝 អត្ថបទរត់ក្រោម (ចុចលើអត្ថបទដើម្បីកែ)</h2>
                        <button id="btn-download-srt" onclick="downloadSRT()" class="hidden text-xs bg-slate-800 hover:bg-slate-700 text-sky-400 py-1.5 px-3 rounded-lg border border-slate-700">
                            📥 ទាញយកឯកសារ .SRT
                        </button>
                    </div>
                    <div id="subtitle" class="custom-scroll max-h-[320px] overflow-y-auto text-slate-400 text-sm space-y-4 min-h-[100px] flex flex-col justify-center items-center border border-dashed border-slate-800 rounded-2xl bg-slate-950/40 p-4">
                        <span class="text-slate-600">មិនទាន់មានទិន្នន័យ...</span>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-emerald-400">🎬 វីដេអូលទ្ធផល (Output Video)</h2>
                    <div class="aspect-video w-full rounded-2xl overflow-hidden bg-slate-950 border border-slate-800 flex items-center justify-center">
                        <video id="output" controls class="w-full h-full object-contain hidden"></video>
                        <span id="output-placeholder" class="text-sm text-slate-600">រង់ចាំការដំណើរការ...</span>
                    </div>
                    <a id="download" class="hidden w-full mt-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-center py-3.5 rounded-xl font-bold text-sm" href="#">
                        💾 ទាញយកវីដេអូបញ្ចូលសំឡេងរួច (+25% Sync)
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script>
        let selectedFile = null;
        let subtitleData = [];

        function previewVideo() {
            selectedFile = document.getElementById("video").files[0];
            if (!selectedFile) return;
            const videoElement = document.getElementById("preview");
            videoElement.src = URL.createObjectURL(selectedFile);
            videoElement.classList.remove("hidden");
            document.getElementById("upload-placeholder").classList.add("hidden");
        }

        function updateProgress(status, percent) {
            const container = document.getElementById("progress-container");
            const bar = document.getElementById("progress-bar");
            document.getElementById("progress-status").innerText = status;
            document.getElementById("progress-percent").innerText = `${percent}%`;
            container.classList.remove("hidden");
            bar.style.width = `${percent}%`;
        }

        function resetProgress() {
            document.getElementById("progress-container").classList.add("hidden");
        }

        async function generateSubtitle() {
            if (!selectedFile) return alert("សូមជ្រើសរើសវីដេអូជាមុនសិន!");
            let fd = new FormData();
            fd.append("file", selectedFile);
            updateProgress("Gemini 3.5 ជម្រុញដំណើរការបំប្លែងអត្ថបទ...", 40);

            try {
                let r = await fetch("/subtitle", { method: "POST", body: fd });
                if (!r.ok) throw new Error("Server រវល់ ឬទិន្នន័យត្រឡប់មកវិញខុសទម្រង់");
                subtitleData = await r.json();
                renderSubtitles();
                document.getElementById("btn-download-srt").classList.remove("hidden");
                updateProgress("រួចរាល់!", 100);
            } catch (err) {
                alert("កំហុសឆ្គង: " + err.message);
                resetProgress();
            } finally {
                setTimeout(resetProgress, 3000);
            }
        }

        function renderSubtitles() {
            let html = "";
            if (subtitleData.length === 0) {
                html = `<span class="text-slate-600">មិនមានទិន្នន័យឡើយ</span>`;
            } else {
                subtitleData.forEach((x, index) => {
                    html += `
                    <div class="bg-slate-950/60 border border-slate-800 p-4 rounded-xl space-y-2 w-full text-left">
                        <div class="text-emerald-400 font-mono text-xs">⏱️ ${x.start} → ${x.end}</div>
                        <div class="text-slate-400 text-xs">
                            <span class="text-slate-500 font-bold">Original:</span> 
                            <span class="cursor-pointer underline decoration-dotted decoration-indigo-500" onclick="makeEditable(this, ${index}, 'original')">${x.original}</span>
                        </div>
                        <div class="text-cyan-300 text-sm">
                            <span class="text-slate-500 text-xs font-bold">Khmer:</span> 
                            <span class="cursor-pointer underline decoration-dotted decoration-cyan-500 text-cyan-300" onclick="makeEditable(this, ${index}, 'khmer')">${x.khmer}</span>
                        </div>
                    </div>`;
                });
            }
            const box = document.getElementById("subtitle");
            box.innerHTML = html;
            box.className = "custom-scroll max-h-[320px] overflow-y-auto pr-2 space-y-3 w-full";
        }

        function makeEditable(element, index, field) {
            const currentText = element.innerText;
            const input = document.createElement("input");
            input.type = "text";
            input.value = currentText;
            input.className = "bg-slate-800 border border-indigo-500 text-white rounded px-2 py-0.5 w-full text-sm focus:outline-none";
            
            function saveChange() {
                const newValue = input.value.trim() || currentText;
                subtitleData[index][field] = newValue;
                renderSubtitles();
            }

            input.addEventListener("blur", saveChange);
            input.addEventListener("keydown", (e) => { if (e.key === "Enter") saveChange(); });
            element.replaceWith(input);
            input.focus();
        }

        async function generateDub() {
            if (!selectedFile || subtitleData.length === 0) return alert("សូមបង្កើត Subtitle ជាមុនសិន!");
            let fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("items_json", JSON.stringify(subtitleData));

            updateProgress("លុបសំឡេងចាស់ & បង្កើតសំឡេងខ្មែរ (ល្បឿន +25%)...", 45);

            try {
                let r = await fetch("/dub_edited", { method: "POST", body: fd });
                if (!r.ok) throw new Error("ការផ្គុំវីដេអូបញ្ចូលសំឡេងបរាជ័យ");

                updateProgress("រៀបចំឯកសាររួចរាល់សម្រាប់ទាញយក...", 90);
                let resData = await r.json();
                updateProgress("ជោគជ័យ!", 100);

   
                let dl = document.getElementById("download");
                dl.href = `/download/${resData.filename}`;
                dl.classList.remove("hidden");

                dl.onclick = function() {
                    setTimeout(() => {
                        alert("⚠️ ឯកសារត្រូវបានលុបចេញពី Server ភ្លាមៗបន្ទាប់ពីទាញយក ដើម្បីសុវត្ថិភាពទិន្នន័យ។");
                        dl.classList.add("hidden");
                    }, 2000);
                };

            } catch (err) {
                alert("កំហុសឆ្គង: " + err.message);
                resetProgress();
            } finally {
                setTimeout(resetProgress, 4000);
            }
        }

        function downloadSRT() {
            if (subtitleData.length === 0) return;
            let srtContent = "";
            subtitleData.forEach((x, i) => { srtContent += `${i + 1}\n${x.start} --> ${x.end}\n${x.khmer}\n\n`; });
            const blob = new Blob([srtContent], { type: "text/srt;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", `subtitles.srt`);
            link.click();
        }
    </script>
</body>
</html>
